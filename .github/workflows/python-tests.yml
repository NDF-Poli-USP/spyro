# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Python tests

on: [push, pull_request]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fast-tests:
    name: Fast Tests
    runs-on: self-hosted

    container:
      image: firedrakeproject/firedrake:2025.4.1
      options: --user root

    steps:
      - name: Pre-run cleanup (workspace only)
        shell: bash
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE:-.}"
          find . -mindepth 1 -maxdepth 1 -exec rm -rf {} +

      - uses: actions/checkout@v4

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          apt-get update
          apt-get -y install git python3 python3-pip
          apt-get -y install gmsh patchelf
          apt-get -y install libgmp3-dev libmpfr-dev libcgal-dev python3-tk

          pip3 install --upgrade pip
          pip3 install segyio
          pip3 install --no-dependencies git+https://github.com/NDF-Poli-USP/SeismicMesh.git
          pip3 install pyamg meshio memory_profiler
          pip3 install pytest pytest-cov pytest-sugar pytest-xdist

      - name: Clear firedrake-related caches
        shell: bash
        run: |
          set -euo pipefail
          rm -rf ~/.cache/loopy \
                 ~/.loopy_kernel_cache \
                 ~/.cache/pyop2 \
                 ~/.cache/tsfc \
                 .pytest_cache || true
          find . -name '*.pkl' -delete || true

      - name: Running serial fast tests
        shell: bash
        run: |
          set -euo pipefail
          ./cleanup.sh || true
          mkdir -p ./logs
          python3 -m pytest -vv --capture=tee-sys \
            tests/on_one_core/test_modal_solvers.py \
            2>&1 | tee ./logs/pytest.log

      - name: Post-run cleanup (workspace only)
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE:-.}"
          find . -mindepth 1 -maxdepth 1 -exec rm -rf {} +

  slow-tests:
    name: Slow Tests and Parallel Tests
    runs-on: self-hosted
    needs: fast-tests
    if: github.event_name == 'pull_request'

    container:
      image: firedrakeproject/firedrake:2025.4.1
      options: --user root

    steps:
      - name: Pre-run cleanup (workspace only)
        shell: bash
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE:-.}"
          find . -mindepth 1 -maxdepth 1 -exec rm -rf {} +

      - uses: actions/checkout@v4

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          apt-get update
          apt-get -y install git python3 python3-pip
          apt-get -y install gmsh patchelf
          apt-get -y install libgmp3-dev libmpfr-dev libcgal-dev python3-tk

          pip3 install --upgrade pip
          pip3 install segyio
          pip3 install --no-dependencies git+https://github.com/NDF-Poli-USP/SeismicMesh.git
          pip3 install pyamg meshio memory_profiler
          pip3 install pytest pytest-cov pytest-sugar pytest-xdist

      - name: Clear firedrake-related caches
        shell: bash
        run: |
          set -euo pipefail
          rm -rf ~/.cache/loopy \
                 ~/.loopy_kernel_cache \
                 ~/.cache/pyop2 \
                 ~/.cache/tsfc \
                 .pytest_cache || true
          find . -name '*.pkl' -delete || true

      - name: Running serial slow tests
        shell: bash
        run: |
          set -euo pipefail
          ./cleanup.sh || true
          python3 -m pytest -n 8 --cov-report=xml --cov-append --cov=spyro \
            tests/on_one_core/ --only-slow

      - name: Running parallel tests (forward only)
        shell: bash
        run: |
          set -euo pipefail
          ./cleanup.sh || true
          mpiexec -n 6 python3 -m pytest tests/three_dimension/test_hexahedral_convergence.py
          mpiexec -n 6 python3 -m pytest tests/parallel/test_forward.py
          mpiexec -n 6 python3 -m pytest tests/parallel/test_forward_supershot.py
          mpiexec -n 2 python3 -m pytest tests/parallel/test_parallel_io.py
          mpiexec -n 2 python3 -m pytest tests/parallel/test_forward_multiple_serial_shots.py

      - name: Running parallel tests (inversion)
        shell: bash
        run: |
          set -euo pipefail
          ./cleanup.sh || true
          mpiexec -n 6 python3 -m pytest tests/parallel/test_fwi.py
          mpiexec -n 3 python3 -m pytest tests/parallel/test_supershot_grad.py
          mpiexec -n 2 python3 -m pytest tests/parallel/test_gradient_serialshots.py

      - name: Coverage (best-effort for parallel tests)
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          mpiexec -n 6 python3 -m pytest --cov-report=xml --cov-append --cov=spyro tests/three_dimension/test_hexahedral_convergence.py
          mpiexec -n 6 python3 -m pytest --cov-report=xml --cov-append --cov=spyro tests/parallel/test_forward.py
          mpiexec -n 6 python3 -m pytest --cov-report=xml --cov-append --cov=spyro tests/parallel/test_fwi.py
          mpiexec -n 6 python3 -m pytest --cov-report=xml --cov-append --cov=spyro tests/parallel/test_forward_supershot.py
          mpiexec -n 2 python3 -m pytest --cov-report=xml --cov-append --cov=spyro tests/parallel/test_parallel_io.py
          mpiexec -n 3 python3 -m pytest --cov-report=xml --cov-append --cov=spyro tests/parallel/test_supershot_grad.py
          mpiexec -n 2 python3 -m pytest --cov-report=xml --cov-append --cov=spyro tests/parallel/test_forward_multiple_serial_shots.py

      - name: Upload coverage to Codecov
        shell: bash
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          set -euo pipefail
          curl -s https://codecov.io/bash | bash

      - name: Post-run cleanup (workspace only)
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE:-.}"
          find . -mindepth 1 -maxdepth 1 -exec rm -rf {} +