# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Python tests

on: [push, pull_request]

permissions:
  contents: read

concurrency:
  # Cancel running jobs if new commits are pushed
  group: >
    ${{ github.workflow }}-
    ${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fast-tests:
    name: Fast Tests
    runs-on: self-hosted
    # Runs on all pushes and pull requests for quick feedback

    container:
      image: firedrakeproject/firedrake:2025.4.1
      options: --user root  # Ensures it can install packages if needed

    steps:

    - name: Pre-run cleanup
      run: |
        rm -rf .pytest_cache
        rm -f .coverage .coverage.*
        find . -name '*.pkl' -delete || true

    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        apt-get update \
        && apt-get -y install git python3 \
        && apt-get -y install gmsh patchelf \
        && pip3 install segyio \
        && apt-get update && apt-get install -y libgmp3-dev libmpfr-dev libcgal-dev python3-tk \
        && pip3 install --no-deps git+https://github.com/NDF-Poli-USP/SeismicMesh.git \
        && pip3 install pyamg \
        && pip3 install meshio \
        && pip3 install -U memory_profiler \
        && pip3 install coverage pytest pytest-cov pytest-xdist  \
        && pip3 install pytest-sugar

    - name: Clear all firedrake-related caches
      run: |
        rm -rf ~/.cache/loopy \
               ~/.loopy_kernel_cache \
               ~/.cache/pyop2 \
               ~/.cache/tsfc \
               .pytest_cache
        find . -name '*.pkl' -delete || true

    - name: Running serial fast tests
      run: |
        ./cleanup.sh
        python3 -m pytest -n 8 --cov-report=xml --cov-report=term-missing --cov=spyro tests/on_one_core/ --skip-slow --durations=10

    - name: Post-run cleanup
      if: always()
      run: |
        rm -rf .pytest_cache
        find . -name '*.pkl' -delete || true
      
    - name: Upload fast coverage artifact
      uses: actions/upload-artifact@v4
      with:
        name: coverage-fast
        path: |
          .coverage
          coverage.xml
        if-no-files-found: ignore


  slow-tests:
    name: Slow Tests and Parallel Tests
    runs-on: self-hosted
    needs: fast-tests
    if: github.event_name == 'pull_request'
    # Only runs on PRs after fast tests pass - saves resources

    container:
      image: firedrakeproject/firedrake:2025.4.1
      options: --user root  # Ensures it can install packages if needed

    steps:

    - name: Pre-run cleanup
      run: |
          rm -rf .pytest_cache
          rm -f .coverage .coverage.*
          find . -name '*.pkl' -delete || true

    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        apt-get update \
        && apt-get -y install git python3 \
        && apt-get -y install gmsh patchelf \
        && pip3 install segyio \
        && apt-get update && apt-get install -y libgmp3-dev libmpfr-dev libcgal-dev python3-tk \
        && pip3 install --no-deps git+https://github.com/NDF-Poli-USP/SeismicMesh.git \
        && pip3 install pyamg \
        && pip3 install meshio \
        && pip3 install -U memory_profiler \
        && pip3 install coverage pytest pytest-cov pytest-xdist  \
        && pip3 install pytest-sugar

    - name: Clear all firedrake-related caches
      run: |
        rm -rf ~/.cache/loopy \
               ~/.loopy_kernel_cache \
               ~/.cache/pyop2 \
               ~/.cache/tsfc \
               .pytest_cache
        find . -name '*.pkl' -delete || true

    - name: Running serial slow tests
      run: |
        ./cleanup.sh
        export COVERAGE_FILE=".coverage.slow"
        python3 -m pytest -n 8 --cov-report=xml --cov-append --cov=spyro tests/on_one_core/  --only-slow

    - name: Running parallel tests for forward problem only
      run: |
        ./cleanup.sh
           export COVERAGE_RCFILE=/dev/null
    
           COVERAGE_FILE=".coverage.hexa.%p" \
           mpiexec -n 6 python3 -m coverage run --parallel-mode -m pytest tests/three_dimension/test_hexahedral_convergence.py
    
            COVERAGE_FILE=".coverage.forward.%p" \
           mpiexec -n 6 python3 -m coverage run --parallel-mode -m pytest tests/parallel/test_forward.py
    
           COVERAGE_FILE=".coverage.supershot.%p" \
           mpiexec -n 6 python3 -m coverage run --parallel-mode -m pytest tests/parallel/test_forward_supershot.py
    
           COVERAGE_FILE=".coverage.parallelio.%p" \
           mpiexec -n 2 python3 -m coverage run --parallel-mode -m pytest tests/parallel/test_parallel_io.py
           
            COVERAGE_FILE=".coverage.multishots.%p" \
            mpiexec -n 2 python3 -m coverage run --parallel-mode -m pytest tests/parallel/test_forward_multiple_serial_shots.py



    - name: Running parallel tests for inversion
      run: |
        ./cleanup.sh
         COVERAGE_FILE=".coverage.fwi.%p" \
         mpiexec -n 6 python3 -m coverage run --parallel-mode -m pytest tests/parallel/test_fwi.py
  
         COVERAGE_FILE=".coverage.supershotgrad.%p" \
        mpiexec -n 3 python3 -m coverage run --parallel-mode -m pytest tests/parallel/test_supershot_grad.py
  
         COVERAGE_FILE=".coverage.gradserial.%p" \
         mpiexec -n 2 python3 -m coverage run --parallel-mode -m pytest tests/parallel/test_gradient_serialshots.py
        


    - name: Combine coverage
      run: |
        if ls .coverage* 1> /dev/null 2>&1; then
          echo "Coverage files found"
          python3 -m coverage combine
          python3 -m coverage xml
          python3 -m coverage report -m
        else
          echo "No coverage files found; skipping combine."
        fi

    - name: Uploading coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        fail_ci_if_error: true
        verbose: true
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}


    - name: Post-run cleanup
      if: always()
      run: find . -delete
