[tool.black]
line-length = 80
target-version = ["py39"]
include = "\\.pyi?$"
extend-exclude = '''
/(
    \.git
  | \.venv
  | build
  | dist
  | __pycache__
)/
'''

[tool.ruff]
line-length = 80
target-version = "py39"

[tool.ruff.lint]
select = ["E", "F", "D"]

[tool.ruff.lint.per-file-ignores]
"spyro/domains/quadrature.py" = ["F405"]
"spyro/pml/damping.py" = ["F405"]

[tool.ruff.lint.pydocstyle]
convention = "numpy"

[tool.docformatter]
wrap-summaries = 80
wrap-descriptions = 80
recursive = true
in-place = true
