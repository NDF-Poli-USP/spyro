[tool.ruff]
line-length = 88
indent-width = 4
target-version = "py39"
# Exclude a variety of commonly ignored directories.
exclude = [
  ".bzr",
  ".direnv",
  ".eggs",
  ".git",
  ".git-rewrite",
  ".hg",
  ".ipynb_checkpoints",
  ".mypy_cache",
  ".nox",
  ".pants.d",
  ".pyenv",
  ".pytest_cache",
  ".pytype",
  ".ruff_cache",
  ".svn",
  ".tox",
  ".venv",
  ".vscode",
  "__pypackages__",
  "_build",
  "buck-out",
  "build",
  "dist",
  "node_modules",
  "site-packages",
  "venv",
  "tests",
  "test_integration",
  "paper",
  "benchmarks",
  "tmp_*",
  "demos",
]
extend-exclude = ["*.ipynb"]

[tool.ruff.lint]
select = ["E", "F", "D"]

[tool.ruff.lint.per-file-ignores]
"spyro/domains/quadrature.py" = ["F405"]
"spyro/pml/damping.py" = ["F405"]
"spyro/receivers/Receivers.py" = ["F405"]
"spyro/utils/utils.py" = ["F405"]

[tool.ruff.lint.pydocstyle]
convention = "numpy"

[tool.ruff.format]
# Like Black, use double quotes for strings.
quote-style = "double"

# Like Black, indent with spaces, rather than tabs.
indent-style = "space"

# Like Black, respect magic trailing commas.
skip-magic-trailing-comma = false

# Like Black, automatically detect the appropriate line ending.
line-ending = "auto"
